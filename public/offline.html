<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#123F3C" />
  <title>Till Payday — offline</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #123F3C;
      color: #F4EEE1;
      font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
      text-align: center;
      padding: 24px;
    }
    .card { max-width: 22rem; }
    img { width: 96px; height: 96px; border-radius: 24px; }
    h1 { font-size: 1.6rem; margin: 20px 0 8px; }
    h1 span { color: #E4A93C; }
    p { opacity: 0.8; line-height: 1.5; margin: 0; }
    button {
      margin-top: 24px;
      background: #E4A93C;
      color: #123F3C;
      border: 0;
      border-radius: 12px;
      padding: 12px 28px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="card">
    <img src="/icons/icon-192.png" alt="" />
    <h1>Till <span>Payday</span></h1>
    <p>
      You're offline. Your money math needs a connection for fresh numbers —
      reconnect and try again.
    </p>
    <button onclick="location.reload()">Retry</button>
  </div>
</body>
</html>
